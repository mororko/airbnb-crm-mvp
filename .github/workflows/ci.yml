name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check API starts
        run: npm run start &
        env:
          DATABASE_URL: postgresql://admin:admin@localhost:5432/airbnbcrm
          JWT_SECRET: test_secret
          PORT: 4000

  web:
    name: Web build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Web dependencies
        run: npm install

      - name: Build Web
        run: npm run build