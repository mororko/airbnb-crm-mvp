services:
  postgres:
    image: postgres:16-alpine
    container_name: airbnbcrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - airbnbcrm_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    container_name: airbnbcrm_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT}:4000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
    container_name: airbnbcrm_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT}:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: airbnbcrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web

volumes:
  airbnbcrm_postgres_data: